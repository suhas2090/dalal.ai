<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live News TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
padding:0;
text-align:center;
}

header{
padding:15px;
font-size:22px;
background:#111;
border-bottom:1px solid #333;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
padding:15px;
background:#161616;
flex-wrap:wrap;
}

.tab{
padding:8px 16px;
background:#1e1e1e;
border-radius:6px;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

.tab:hover{
background:#333;
}

.tab.active{
background:#ff3b3b;
}

.player-container{
width:80%;
margin:30px auto;
}

video{
width:100%;
border-radius:8px;
background:black;
}
</style>

</head>
<body>

<header>
LIVE NEWS TV
</header>

<div class="tabs">

<div class="tab active" onclick="switchChannel('https://amg01334-foxnews-amg01334c1-rakuten-us-3248.playouts.now.amagi.tv/playlist.m3u8',this)">Fox News</div>

<div class="tab" onclick="switchChannel('https://cnn-cnninternational-1-eu.rakuten.wurl.tv/playlist.m3u8',this)">CNN</div>

<div class="tab" onclick="switchChannel('https://ythls.onrender.com/channel/UCupvZG-5ko_eiXAupbDfxWw.m3u8',this)">NDTV</div>

<div class="tab" onclick="switchChannel('https://tv-trtworld.live.trt.com.tr/master.m3u8',this)">TRT World</div>

<div class="tab" onclick="switchChannel('https://dai.google.com/linear/hls/event/7v1Z1tcHTid3e8DqRLVQpw/master.m3u8',this)">France 24</div>

</div>

<div class="player-container">
<video id="video" controls autoplay></video>
</div>

<script>

const video = document.getElementById('video');
let hls;

function switchChannel(url,el){

document.querySelectorAll('.tab').forEach(t=>{
t.classList.remove('active');
});

el.classList.add('active');

if(Hls.isSupported()){

if(hls){
hls.destroy();
}

hls = new Hls();
hls.loadSource(url);
hls.attachMedia(video);

}

else if(video.canPlayType('application/vnd.apple.mpegurl')){
video.src = url;
}

}

switchChannel(
'https://amg01334-foxnews-amg01334c1-rakuten-us-3248.playouts.now.amagi.tv/playlist.m3u8',
document.querySelector('.tab')
);

</script>

</body>
</html>
